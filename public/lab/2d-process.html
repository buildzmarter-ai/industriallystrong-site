<!DOCTYPE html>

<html>
<head>
<title>EUV Litho Pipeline</title>
<style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #fafafa; }
        .nav { background: #1a1a2e; padding: 8px 24px; display: flex; gap: 16px; align-items: center; }
        .nav a { color: #aac; text-decoration: none; font-size: 14px; padding: 4px 12px; border-radius: 4px; }
        .nav a:hover { background: #2a2a4e; }
        .nav a.active { background: #2563eb; color: #fff; }
        .controls {
            background: #fff; padding: 16px 24px; border-bottom: 1px solid #e0e0e0;
            display: flex; flex-wrap: wrap; gap: 16px; align-items: end;
        }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        .control-group input { width: 90px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .control-group .value-display { font-size: 11px; color: #888; min-height: 16px; }
        button {
            padding: 8px 20px; background: #2563eb; color: #fff; border: none;
            border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600;
            align-self: end;
        }
        button:hover { background: #1d4ed8; }
        .plot-container { padding: 8px; }
    </style>
<script charset="utf-8" src="plotly.min.js"></script></head>
<body>
<div class="nav">
<a class="active" href="2d-process.html">2D Process Sim</a>
<a href="3d-pipeline.html">3D Pipeline</a>
<a href="fleet-economics.html">Fleet Economics</a>
<a href="multihead.html">Multi-Head Array</a>
</div>
<form action="2d-process.html" class="controls" method="get" onsubmit="return false;">
<div class="control-group">
<label>Dose (mJ/cm²)</label>
<input max="500" min="1" name="dose" step="any" type="number" value="20.0"/>
</div>
<div class="control-group">
<label>Line Width (nm)</label>
<input max="128" min="1" name="line_width" step="any" type="number" value="20"/>
</div>
<div class="control-group">
<label>PEB Time (s)</label>
<input max="300" min="1" name="peb_time" step="any" type="number" value="60.0"/>
</div>
<div class="control-group">
<label>Diffusion (nm²/s)</label>
<input max="50" min="0.1" name="diffusion_coef" step="any" type="number" value="5.0"/>
</div>
<div class="control-group">
<label>k_amp</label>
<input max="2" min="0.01" name="k_amp" step="any" type="number" value="0.2"/>
</div>
<div class="control-group">
<label>r_max (nm/s)</label>
<input max="1000" min="1" name="r_max" step="any" type="number" value="100.0"/>
</div>
<div class="control-group">
<label>Mack n</label>
<input max="20" min="1" name="n_mack" step="any" type="number" value="5"/>
</div>
<button type="submit">Simulate</button>
</form>
<div class="plot-container">
<div> <script>/* moved to external js */</script>

</div>
<script src="2d-process-charts.js"></script></body>
</html>
